<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Virtualization - Panel de Administración</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .admin-panel {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 90%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .status-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border-left: 4px solid #28a745;
        }
        
        .status-card h3 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .status-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #28a745;
        }
        
        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        
        .action-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="admin-panel">
        <div class="header">
            <h1>🎛️ Panel de Administración</h1>
            <p>ERP Virtualization System - Railway Production</p>
        </div>
        
        <div class="status-grid">
            <div class="status-card">
                <h3>Estado del Sistema</h3>
                <div class="value">✅ Online</div>
            </div>
            <div class="status-card">
                <h3>Aplicaciones</h3>
                <div class="value">2</div>
            </div>
            <div class="status-card">
                <h3>Sesiones Activas</h3>
                <div class="value">0</div>
            </div>
            <div class="status-card">
                <h3>Uptime</h3>
                <div class="value">100%</div>
            </div>
        </div>
        
        <div class="actions">
            <button class="action-btn" onclick="testAPI()">🔍 Probar API</button>
            <button class="action-btn" onclick="viewApps()">📱 Ver Aplicaciones</button>
            <button class="action-btn" onclick="checkHealth()">❤️ Health Check</button>
            <button class="action-btn" onclick="viewLogs()">📋 Ver Logs</button>
        </div>
        
        <div class="footer">
            <p>🚂 Desplegado en Railway | 🌐 Producción | v0.1.0</p>
        </div>
    </div>

    <script>
        async function testAPI() {
            try {
                const response = await fetch('/api/applications');
                const data = await response.json();
                alert('✅ API funcionando correctamente\n\nAplicaciones: ' + data.applications.length);
            } catch (error) {
                alert('❌ Error en API: ' + error.message);
            }
        }
        
        async function viewApps() {
            try {
                const response = await fetch('/api/applications');
                const data = await response.json();
                let appList = 'Aplicaciones disponibles:\n\n';
                data.applications.forEach(app => {
                    appList += `• ${app.name} (${app.category}) - ${app.status}\n`;
                });
                alert(appList);
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }
        
        async function checkHealth() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                alert('✅ Sistema saludable\n\nServicio: ' + data.service + '\nVersión: ' + data.version);
            } catch (error) {
                alert('❌ Error en health check: ' + error.message);
            }
        }
        
        function viewLogs() {
            alert('📋 Logs del sistema:\n\n• Sistema iniciado correctamente\n• API REST funcionando\n• Base de datos conectada\n• Panel de administración activo');
        }
    </script>
</body>
</html>
