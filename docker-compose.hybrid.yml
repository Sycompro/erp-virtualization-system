# Docker Compose para Arquitectura Híbrida - Servidor Local
version: '3.8'

services:
  # Servidor Local de Streaming y Containers
  erp-local-server:
    build: ./server-local
    container_name: erp-local-server
    restart: unless-stopped
    ports:
      - "8080:8080"      # API local
      - "5900-5910:5900-5910"  # VNC ports para 5 usuarios
      - "3389-3399:3389-3399"  # RDP ports para 5 usuarios
    environment:
      - RUST_LOG=info
      - RAILWAY_API_URL=${RAILWAY_API_URL:-https://your-railway-app.railway.app}
      - MAX_CONCURRENT_CONTAINERS=15  # 3 containers por tablet
    volumes:
      - ./data/containers:/data/containers
      - ./logs/local:/var/log/erp
      - /var/run/docker.sock:/var/run/docker.sock  # Acceso a Docker
    networks:
      - erp-local-network
    depends_on:
      - coturn

  # TURN Server para WebRTC
  coturn:
    image: coturn/coturn:latest
    container_name: erp-coturn
    restart: unless-stopped
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49152-49162:49152-49162/udp"  # Rango de puertos para 5 usuarios
    environment:
      - TURN_USERNAME=erp_turn_user
      - TURN_PASSWORD=${TURN_PASSWORD:-turn_secure_password_change_me}
    command: |
      -n
      -r ${DOMAIN:-localhost}
      -p 3478
      -u erp_turn_user:${TURN_PASSWORD:-turn_secure_password_change_me}
      -v
      -f
      -a
      --no-dtls
      --no-tls
    networks:
      - erp-local-network

  # Nginx para proxy y SSL (opcional)
  nginx-local:
    image: nginx:alpine
    container_name: erp-nginx-local
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/local.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - erp-local-server
    networks:
      - erp-local-network
    profiles:
      - nginx  # Solo se inicia con --profile nginx

  # Contenedor SAP (se inicia dinámicamente)
  sap-template:
    image: erp-virtualization/sap-gui:latest
    container_name: sap-template
    restart: "no"
    environment:
      - DISPLAY=:1
      - VNC_RESOLUTION=1920x1080
      - VNC_PASSWORD=sap_vnc_pass
    volumes:
      - ./data/sap:/sap/data
    networks:
      - erp-local-network
    profiles:
      - templates  # No se inicia automáticamente

  # Contenedor Office (se inicia dinámicamente)
  office-template:
    image: erp-virtualization/office:latest
    container_name: office-template
    restart: "no"
    environment:
      - RDP_USER=office_user
      - RDP_PASSWORD=office_pass
    volumes:
      - ./data/office:/home/office_user/Documents
    networks:
      - erp-local-network
    profiles:
      - templates

  # Contenedor AutoCAD (se inicia dinámicamente)
  autocad-template:
    image: erp-virtualization/autocad:latest
    container_name: autocad-template
    restart: "no"
    environment:
      - RDP_USER=cad_user
      - RDP_PASSWORD=cad_pass
      - GPU_ACCELERATION=true
    volumes:
      - ./data/autocad:/home/cad_user/Projects
    networks:
      - erp-local-network
    profiles:
      - templates
    # Acceso a GPU si está disponible
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Monitoreo local (opcional)
  prometheus-local:
    image: prom/prometheus:latest
    container_name: erp-prometheus-local
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus-local.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - erp-local-network
    profiles:
      - monitoring

networks:
  erp-local-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

volumes:
  container_data:
  prometheus_data: