# Configuración de Seguridad de Red para ERP Virtualization

# Certificados SSL/TLS para dominios
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: erp-company-cert
  namespace: erp-system
spec:
  secretName: erp-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - erp.company.com
  - api.erp.company.com
  - stream.erp.company.com
  - admin.erp.company.com

---
# Istio Gateway para acceso externo seguro
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: erp-gateway
  namespace: erp-system
spec:
  selector:
    istio: ingressgateway
  servers:
  # HTTPS Principal
  - port:
      number: 443
      name: https-main
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: erp-tls-secret
    hosts:
    - erp.company.com
    - api.erp.company.com
    - stream.erp.company.com
  
  # WebRTC/TURN para streaming
  - port:
      number: 3478
      name: turn-tcp
      protocol: TCP
    hosts:
    - turn.erp.company.com
  - port:
      number: 3478
      name: turn-udp
      protocol: UDP
    hosts:
    - turn.erp.company.com
  
  # Redirect HTTP to HTTPS
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - erp.company.com
    - api.erp.company.com
    tls:
      httpsRedirect: true

---
# Virtual Service para routing inteligente
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: erp-routing
  namespace: erp-system
spec:
  hosts:
  - erp.company.com
  - api.erp.company.com
  - stream.erp.company.com
  gateways:
  - erp-gateway
  http:
  # API Routes
  - match:
    - uri:
        prefix: /api/
    route:
    - destination:
        host: erp-virtualization-service
        port:
          number: 80
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
  
  # WebSocket para streaming
  - match:
    - uri:
        prefix: /stream/
    - headers:
        upgrade:
          exact: websocket
    route:
    - destination:
        host: erp-virtualization-service
        port:
          number: 80
    timeout: 0s  # Sin timeout para WebSocket
  
  # Admin Panel
  - match:
    - uri:
        prefix: /admin/
    - headers:
        authorization:
          regex: "Bearer .*"
    route:
    - destination:
        host: erp-admin-service
        port:
          number: 80
    fault:
      delay:
        percentage:
          value: 0.1
        fixedDelay: 5s

---
# Network Policy - Segmentación de red estricta
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: erp-network-policy
  namespace: erp-system
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  
  # Reglas de entrada
  ingress:
  # Permitir tráfico desde Istio Gateway
  - from:
    - namespaceSelector:
        matchLabels:
          name: istio-system
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 8443
  
  # Permitir comunicación entre pods del sistema ERP
  - from:
    - podSelector:
        matchLabels:
          app: erp-virtualization
    ports:
    - protocol: TCP
      port: 8080
    - protocol: UDP
      port: 3478
  
  # Reglas de salida
  egress:
  # Permitir acceso a bases de datos
  - to:
    - namespaceSelector:
        matchLabels:
          name: database
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL
    - protocol: TCP
      port: 6379  # Redis
  
  # Permitir DNS
  - to: []
    ports:
    - protocol: UDP
      port: 53
  
  # Permitir HTTPS saliente para APIs externas
  - to: []
    ports:
    - protocol: TCP
      port: 443

---
# Security Policy - Istio AuthorizationPolicy
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: erp-access-control
  namespace: erp-system
spec:
  selector:
    matchLabels:
      app: erp-virtualization
  
  # Reglas de acceso
  rules:
  # Permitir acceso autenticado a la API
  - from:
    - source:
        requestPrincipals: ["*"]
    to:
    - operation:
        methods: ["GET", "POST", "PUT", "DELETE"]
        paths: ["/api/*"]
    when:
    - key: request.headers[authorization]
      values: ["Bearer *"]
  
  # Permitir WebSocket para streaming (autenticado)
  - from:
    - source:
        requestPrincipals: ["*"]
    to:
    - operation:
        methods: ["GET"]
        paths: ["/stream/*"]
    when:
    - key: request.headers[upgrade]
      values: ["websocket"]
    - key: request.headers[authorization]
      values: ["Bearer *"]
  
  # Permitir health checks
  - from:
    - source:
        principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]
    to:
    - operation:
        methods: ["GET"]
        paths: ["/health", "/ready"]

---
# Rate Limiting para prevenir ataques
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: erp-rate-limit
  namespace: erp-system
spec:
  workloadSelector:
    labels:
      app: erp-virtualization
  configPatches:
  - applyTo: HTTP_FILTER
    match:
      context: SIDECAR_INBOUND
      listener:
        filterChain:
          filter:
            name: "envoy.filters.network.http_connection_manager"
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.filters.http.local_ratelimit
        typed_config:
          "@type": type.googleapis.com/udpa.type.v1.TypedStruct
          type_url: type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
          value:
            stat_prefix: erp_rate_limiter
            token_bucket:
              max_tokens: 100
              tokens_per_fill: 100
              fill_interval: 60s
            filter_enabled:
              runtime_key: local_rate_limit_enabled
              default_value:
                numerator: 100
                denominator: HUNDRED
            filter_enforced:
              runtime_key: local_rate_limit_enforced
              default_value:
                numerator: 100
                denominator: HUNDRED